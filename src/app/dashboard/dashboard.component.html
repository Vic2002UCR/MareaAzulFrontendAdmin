<div class="dashboard-container" *ngIf="!cargando">
  <h1>Dashboard de Control Administrativo</h1>

  <div class="kpi-grid">
    <div class="kpi-card">
      <h3>Total Recaudado</h3>
      <p class="kpi-value">${{ metrics?.totalRecaudadoHistorico }}</p>
    </div>

    <div class="kpi-card">
      <h3>Número de Reservas</h3>
      <p class="kpi-value">{{ metrics?.totalReservasRealizadas }}</p>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card ingresos-chart">
      <h3>Historial de Ingresos</h3>

      <div class="chart-wrapper" *ngIf="lineChartData; else graficoError">
        <canvas
          baseChart
          [data]="lineChartData"
          [options]="lineChartOptions"
          [type]="lineChartType">
        </canvas>
      </div>
    </div>

    <div class="chart-card small-chart">
      <h3>Estado de Ocupación de Habitaciones</h3>

      <div class="chart-wrapper" *ngIf="doughnutChartData; else graficoError">
        <canvas
          baseChart
          [data]="doughnutChartData"
          [options]="doughnutChartOptions"
          [type]="doughnutChartType">
        </canvas>
      </div>
    </div>

    <div class="chart-card small-chart">
      <h3>Estado de Reservaciones</h3>

      <div class="chart-wrapper" *ngIf="reservasChartData; else graficoError">
        <canvas
          baseChart
          [data]="reservasChartData"
          [options]="reservasChartOptions"
          [type]="reservasChartType">
        </canvas>
      </div>
    </div>
  </div>
</div>

<ng-template #graficoError>
  <p class="chart-error">
    No existen datos registrados.
  </p>
</ng-template>

<div *ngIf="cargando" class="loading-spinner">
  <p>Cargando datos del hotel...</p>
</div>
