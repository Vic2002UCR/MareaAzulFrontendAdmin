<div class="contenedor">

  <!-- Header -->
  <div class="header">
    <h2>Oferta</h2>
    <button class="btn-agregar" (click)="agregar()">Agregar</button>
  </div>

  <!-- Carrusel -->
  <div class="carrusel">
    <span class="flecha" (click)="scrollIzq()">&#10094;</span>

    <div class="ofertas" #contenedorOfertas>
      <div class="card" *ngFor="let oferta of ofertas">
        
        <div class="imagen">
          <!-- luego imagen real -->
        </div>

        <p class="titulo">{{ oferta.titulo }}</p>

        <div class="acciones">
          <button (click)="editar(oferta)">Editar</button>
          <button (click)="eliminar(oferta.id)">Eliminar</button>
        </div>

      </div>
    </div>

    <span class="flecha" (click)="scrollDer()">&#10095;</span>
  </div>

</div>

<!-- MODAL -->
<div class="modal-backdrop" *ngIf="mostrarModal" (click)="cerrarModal()">

  <div class="modal" (click)="$event.stopPropagation()">

    <h3>Nueva Oferta</h3>

    <form (ngSubmit)="guardarOferta()">

      <label>Título</label>
      <input type="text" [(ngModel)]="nuevaOferta.titulo" name="titulo" required>

      <label>Descripción</label>
      <textarea [(ngModel)]="nuevaOferta.descripcion" name="descripcion"></textarea>

      <label>Precio</label>
      <input type="number" [(ngModel)]="nuevaOferta.precio" name="precio" required>

      <div class="acciones-modal">
        <button type="button" (click)="cerrarModal()">Cancelar</button>
        <button type="submit">Guardar</button>
      </div>

    </form>

  </div>

</div>
