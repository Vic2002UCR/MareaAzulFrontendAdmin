<div class="container">

  <h1>Bitácoras de Uso del Sistema</h1>

  <!-- FILTROS -->
  <section class="filters">

    <h2>Consulta de movimientos</h2>

    <div class="filter-grid">

      <!-- Usuario -->
      <div class="form-group">
        <label>Usuario</label>
        <select [(ngModel)]="filtroUsuario">
          <option value="">Todos</option>

    <option
      *ngFor="let usuario of usuarios"
      [value]="usuario"
    >
      {{ usuario }}
    </option>
        
        </select>
      </div>

      <!-- Fecha inicio -->
      <div class="form-group">
        <label>Fecha inicio</label>
        <input
          type="date"
          [(ngModel)]="fechaInicio"
          (change)="validarFechas()"
        >
      </div>

      <!-- Fecha fin -->
      <div class="form-group">
        <label>Fecha fin</label>
        <input
          type="date"
          [(ngModel)]="fechaFin"
          [min]="fechaInicio"
          (change)="validarFechas()"
        >
      </div>

      <!-- Operación -->
      <div class="form-group">
        <label>Tipo de operación</label>
        <select [(ngModel)]="filtroOperacion">

  <option value="">Todas</option>

  <option value="LOGIN_SUCCESS">Login</option>
  <option value="INSERT">Inserción</option>
  <option value="UPDATE">Modificación</option>
  <option value="DELETE">Eliminación</option>
  <option value="GET">Consulta</option>

</select>
      </div>

    </div>

    <div class="buttons">

      <button class="btn-search" (click)="filtrar()">
        Buscar
      </button>

      <button class="btn-clear" (click)="limpiar()">
        Limpiar filtros
      </button>

    </div>

  </section>

  <!-- TABLA -->
  <section class="table-container">

    <table>

      <thead>
        <tr>
          <th>Usuario</th>
          <th>Fecha y Hora</th>
          <th>IP</th>
          <th>Nombre Máquina</th>
          <th>Operación</th>
          <th>Detalle</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let b of logsFiltrados">

  <!-- Usuario real del backend -->
  <td>{{ b.adminNombre }}</td>

  <!-- Fecha real -->
  <td>
    {{ b.fechaHora | date:'dd/MM/yyyy hh:mm a' }}
  </td>

  <!-- IP real -->
  <td>{{ b.ipAddress }}</td>

  <!-- Máquina real -->
  <td>{{ b.nombreDispositivo }}</td>

  <!-- Operación -->
  <td>
    <span class="tag {{ b.operacion.toLowerCase() }}">
      {{ b.operacion | uppercase }}
    </span>
  </td>

  <!-- Detalle -->
  <td>{{ b.detalle }}</td>

</tr>

      </tbody>

    </table>

  </section>

</div>
